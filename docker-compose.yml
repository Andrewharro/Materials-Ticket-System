version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: materials_os
      POSTGRES_USER: materials
      POSTGRES_PASSWORD: materials_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Uncomment below to enable pgAdmin web UI at http://localhost:5050
  # pgadmin:
  #   image: dpage/pgadmin4
  #   restart: unless-stopped
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@admin.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   depends_on:
  #     - postgres

volumes:
  pgdata:
